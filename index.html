<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSR CAD - Professional Browser Workspace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        /* Custom scrollbars for native application feel */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .no-select { user-select: none; }
        
        /* Interactive resizer bar visual feedback */
        .resizer-v {
            width: 4px;
            cursor: col-resize;
            transition: background 0.2s;
        }
        .resizer-v:hover, .resizer-v.active {
            background: #3b82f6;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col bg-slate-950 text-slate-100 overflow-hidden font-sans text-xs no-select">

    <header class="h-12 bg-slate-900 border-b border-slate-800 flex items-center px-4 justify-between shrink-0 shadow-lg z-20">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="font-black text-sm tracking-wider text-blue-500">CSR</span>
                <span class="font-light text-sm tracking-widest text-slate-400">CAD</span>
            </div>
            <div class="h-4 w-px bg-slate-700 mx-2"></div>
            <div class="flex items-center gap-1">
                <button id="btn-cube" class="px-2.5 py-1 bg-slate-800 hover:bg-slate-700 rounded border border-slate-700 transition-colors" title="Add Cube">Cube</button>
                <button id="btn-sphere" class="px-2.5 py-1 bg-slate-800 hover:bg-slate-700 rounded border border-slate-700 transition-colors" title="Add Sphere">Sphere</button>
                <button id="btn-cylinder" class="px-2.5 py-1 bg-slate-800 hover:bg-slate-700 rounded border border-slate-700 transition-colors" title="Add Cylinder">Cylinder</button>
                <button id="btn-cone" class="px-2.5 py-1 bg-slate-800 hover:bg-slate-700 rounded border border-slate-700 transition-colors" title="Add Cone">Cone</button>
                <button id="btn-torus" class="px-2.5 py-1 bg-slate-800 hover:bg-slate-700 rounded border border-slate-700 transition-colors" title="Add Torus">Torus</button>
            </div>
            <div class="h-4 w-px bg-slate-700 mx-2"></div>
            <div class="flex items-center bg-slate-950 rounded p-0.5 border border-slate-800">
                <button id="view-solid" class="px-2 py-0.5 rounded bg-blue-600 text-white font-medium">Solid</button>
                <button id="view-wireframe" class="px-2 py-0.5 rounded text-slate-400 hover:text-white">Wire</button>
                <button id="view-xray" class="px-2 py-0.5 rounded text-slate-400 hover:text-white">X-Ray</button>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <span class="text-slate-500 text-[10px] bg-slate-950 px-2 py-1 rounded border border-slate-800 mr-2">
                Gizmo: <kbd class="text-blue-400 font-bold">W</kbd> Move | <kbd class="text-blue-400 font-bold">E</kbd> Rot | <kbd class="text-blue-400 font-bold">R</kbd> Scale
            </span>
            <button id="btn-undo" class="px-2.5 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded border border-slate-700 transition-colors">Undo</button>
            <button id="btn-clear" class="px-2.5 py-1 bg-slate-900 hover:bg-red-950 hover:text-red-400 text-slate-400 rounded border border-slate-800 transition-colors">Clear</button>
            <button id="btn-export" class="px-3 py-1 bg-blue-600 hover:bg-blue-500 text-white rounded font-medium shadow-md transition-colors">Export STL</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden w-full relative">
        
        <aside id="sidebar-left" class="w-60 min-w-[160px] max-w-[400px] bg-slate-900 flex flex-col shrink-0">
            <div class="p-2 border-b border-slate-800 bg-slate-900/50 font-bold text-[10px] tracking-wider text-slate-400 uppercase">
                Assembly Tree
            </div>
            <div id="browser-tree" class="flex-1 overflow-y-auto p-2 flex flex-col gap-1 bg-slate-900">
                </div>
        </aside>

        <div id="resizer-left" class="resizer-v bg-slate-800 z-10"></div>

        <div id="viewport" class="flex-1 relative cursor-crosshair outline-none bg-slate-950" tabindex="0">
            </div>

        <div id="resizer-right" class="resizer-v bg-slate-800 z-10"></div>

        <aside id="sidebar-right" class="w-72 min-w-[200px] max-w-[500px] bg-slate-900 flex flex-col shrink-0">
            <div class="p-2 border-b border-slate-800 bg-slate-900/50 font-bold text-[10px] tracking-wider text-slate-400 uppercase">
                Element Parameters
            </div>
            
            <div id="properties-panel" class="flex-1 overflow-y-auto p-4 hidden space-y-4">
                <div>
                    <label class="block text-[10px] text-slate-400 uppercase tracking-wider mb-1">Object Designation</label>
                    <input type="text" id="prop-name" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-[10px] text-slate-400 uppercase tracking-wider mb-1">Spatial Position (X, Y, Z)</label>
                    <div class="flex gap-1.5">
                        <input type="number" id="prop-pos-x" step="0.25" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 text-center">
                        <input type="number" id="prop-pos-y" step="0.25" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 text-center">
                        <input type="number" id="prop-pos-z" step="0.25" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 text-center">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] text-slate-400 uppercase tracking-wider mb-1">Volumetric Scale (X, Y, Z)</label>
                    <div class="flex gap-1.5">
                        <input type="number" id="prop-scale-x" step="0.1" min="0.01" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 text-center">
                        <input type="number" id="prop-scale-y" step="0.1" min="0.01" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 text-center">
                        <input type="number" id="prop-scale-z" step="0.1" min="0.01" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 text-center">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] text-slate-400 uppercase tracking-wider mb-1">Rotation Angles (X, Y, Z°)</label>
                    <div class="flex gap-1.5">
                        <input type="number" id="prop-rot-x" step="5" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 text-center">
                        <input type="number" id="prop-rot-y" step="5" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 text-center">
                        <input type="number" id="prop-rot-z" step="5" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 text-center">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] text-slate-400 uppercase tracking-wider mb-1">Surface Finish Color</label>
                    <input type="color" id="prop-color" class="w-full h-8 bg-slate-950 border border-slate-800 rounded cursor-pointer">
                </div>
            </div>
            
            <div id="properties-empty" class="flex-1 flex items-center justify-center text-slate-500 p-6 text-center tracking-wide leading-relaxed">
                Awaiting entity selection to populate configuration matrix.
            </div>
        </aside>

    </main>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';

        // --- Core Architectural State Globals ---
        let scene, camera, renderer;
        let orbitControls, transformControls;
        let raycaster, mouse;
        
        let objects = []; 
        let selectedObject = null;
        let selectionBoxHelper; 
        
        // System Config State
        let currentViewMode = 'solid'; // options: 'solid', 'wireframe', 'xray'
        const STORAGE_KEY = 'CSR_CAD_PROJECT_DATA';

        // DOM Handle Mappings
        const viewport = document.getElementById('viewport');
        const browserTree = document.getElementById('browser-tree');
        const propertiesPanel = document.getElementById('properties-panel');
        const propertiesEmpty = document.getElementById('properties-empty');
        
        // --- Initialization Kickoff ---
        initWorkspace();
        setupWorkspaceResizers();
        animateEngine();

        function initWorkspace() {
            // 1. Initial Core Engine Hookup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x090d16); // Sophisticated Slate-950 dark

            camera = new THREE.PerspectiveCamera(45, viewport.clientWidth / viewport.clientHeight, 0.1, 1000);
            camera.position.set(12, 12, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(viewport.clientWidth, viewport.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            viewport.appendChild(renderer.domElement);

            // 2. Space Metrics Setup (Grid/Axes Systems)
            const gridHelper = new THREE.GridHelper(40, 40, 0x334155, 0x1e293b);
            gridHelper.position.y = -0.01; // Avoid clean-surface fighting with flat shapes
            scene.add(gridHelper);

            // 3. Illumination Pipeline Setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLightPrimary = new THREE.DirectionalLight(0xffffff, 0.7);
            directionalLightPrimary.position.set(15, 30, 15);
            scene.add(directionalLightPrimary);

            const directionalLightSecondary = new THREE.DirectionalLight(0x38bdf8, 0.2); // Subtle blue fill light
            directionalLightSecondary.position.set(-15, 10, -15);
            scene.add(directionalLightSecondary);

            // 4. Transform Gizmo and Interactive Tracking Mechanics
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;

            transformControls = new TransformControls(camera, renderer.domElement);
            transformControls.size = 0.85; // Elegant thin footprint
            
            transformControls.addEventListener('dragging-changed', (e) => {
                orbitControls.enabled = !e.value;
                if (!e.value) saveSceneToStorage(); // Save scene upon finishing gizmo drag transformation
            });
            
            transformControls.addEventListener('change', () => {
                if (selectedObject) {
                    updatePropertiesUI();
                    selectionBoxHelper.update();
                }
            });
            scene.add(transformControls);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            selectionBoxHelper = new THREE.BoxHelper(new THREE.Mesh());
            selectionBoxHelper.material.color.setHex(0x3b82f6); // CSS blue-500 primary branding accent
            selectionBoxHelper.visible = false;
            scene.add(selectionBoxHelper);

            // 5. Interface & Native Core Bindings
            window.addEventListener('resize', onWindowResize);
            viewport.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('keydown', onKeyboardShortcuts);

            // Primitive Insertion Hooks
            document.getElementById('btn-cube').addEventListener('click', () => addObject('cube'));
            document.getElementById('btn-sphere').addEventListener('click', () => addObject('sphere'));
            document.getElementById('btn-cylinder').addEventListener('click', () => addObject('cylinder'));
            document.getElementById('btn-cone').addEventListener('click', () => addObject('cone'));
            document.getElementById('btn-torus').addEventListener('click', () => addObject('torus'));
            
            // Base Actions
            document.getElementById('btn-undo').addEventListener('click', undoLastAction);
            document.getElementById('btn-clear').addEventListener('click', clearEntireWorkspace);
            document.getElementById('btn-export').addEventListener('click', exportToSTL);

            // Render State Modes Bindings
            setupViewModeControls();

            // Direct Parameter Field Input Listeners
            setupPropertyFieldListeners();

            // 6. Project Local Storage Context Hydration 
            loadSceneFromStorage();
        }

        // --- Draggable & Resizable Panel Infrastructure ---
        function setupWorkspaceResizers() {
            const resizerLeft = document.getElementById('resizer-left');
            const resizerRight = document.getElementById('resizer-right');
            const sidebarLeft = document.getElementById('sidebar-left');
            const sidebarRight = document.getElementById('sidebar-right');

            // Left Sidebar Drag Logic
            resizerLeft.addEventListener('mousedown', (e) => {
                resizerLeft.classList.add('active');
                const startX = e.clientX;
                const startWidth = sidebarLeft.offsetWidth;

                function doDrag(moveEvent) {
                    const newWidth = startWidth + (moveEvent.clientX - startX);
                    if(newWidth >= 160 && newWidth <= 400) {
                        sidebarLeft.style.width = `${newWidth}px`;
                        onWindowResize();
                    }
                }
                function stopDrag() {
                    resizerLeft.classList.remove('active');
                    window.removeEventListener('mousemove', doDrag);
                    window.removeEventListener('mouseup', stopDrag);
                }
                window.addEventListener('mousemove', doDrag);
                window.addEventListener('mouseup', stopDrag);
            });

            // Right Sidebar Drag Logic
            resizerRight.addEventListener('mousedown', (e) => {
                resizerRight.classList.add('active');
                const startX = e.clientX;
                const startWidth = sidebarRight.offsetWidth;

                function doDrag(moveEvent) {
                    const newWidth = startWidth - (moveEvent.clientX - startX);
                    if(newWidth >= 200 && newWidth <= 500) {
                        sidebarRight.style.width = `${newWidth}px`;
                        onWindowResize();
                    }
                }
                function stopDrag() {
                    resizerRight.classList.remove('active');
                    window.removeEventListener('mousemove', doDrag);
                    window.removeEventListener('mouseup', stopDrag);
                }
                window.addEventListener('mousemove', doDrag);
                window.addEventListener('mouseup', stopDrag);
            });
        }

        // --- Transformation Keyboard Control Interceptors ---
        function onKeyboardShortcuts(event) {
            // Block triggers if active typing inside configuration fields
            if (document.activeElement.tagName === 'INPUT') return;

            switch (event.key.toLowerCase()) {
                case 'w':
                    transformControls.setMode('translate');
                    break;
                case 'e':
                    transformControls.setMode('rotate');
                    break;
                case 'r':
                    transformControls.setMode('scale');
                    break;
                case 'escape':
                    deselectObject();
                    break;
                case 'delete':
                case 'backspace':
                    if (selectedObject) deleteObject(selectedObject);
                    break;
            }
        }

        // --- Object Spawning Engine ---
        function addObject(type, loadedConfig = null) {
            let geometry;
            
            // Build Contextual Structural Primitives
            switch(type) {
                case 'cube': geometry = new THREE.BoxGeometry(2, 2, 2); break;
                case 'sphere': geometry = new THREE.SphereGeometry(1.2, 32, 32); break;
                case 'cylinder': geometry = new THREE.CylinderGeometry(1, 1, 2.5, 32); break;
                case 'cone': geometry = new THREE.ConeGeometry(1, 2.5, 32); break;
                case 'torus': geometry = new THREE.TorusGeometry(1, 0.3, 16, 100); break;
            }

            const material = new THREE.MeshStandardMaterial({ 
                color: loadedConfig ? new THREE.Color(loadedConfig.color) : Math.random() * 0xffffff, 
                roughness: 0.4, 
                metalness: 0.1 
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.userData.primitiveType = type;

            if (loadedConfig) {
                // Instantiating matching state directly from historical storage configs
                mesh.name = loadedConfig.name;
                mesh.position.fromArray(loadedConfig.position);
                mesh.rotation.fromArray(loadedConfig.rotation);
                mesh.scale.fromArray(loadedConfig.scale);
            } else {
                // Brand new entity generation offset positions standard tracking
                mesh.position.set(0, 1, 0);
                const countOfType = objects.filter(o => o.userData.primitiveType === type).length + 1;
                mesh.name = `${type.charAt(0).toUpperCase() + type.slice(1)} _00${countOfType}`;
            }

            // Apply global UI rendering view structural settings to new elements instantly
            applyViewModeToMaterial(mesh.material);

            scene.add(mesh);
            objects.push(mesh);
            
            updateBrowserTree();
            selectObject(mesh);
            saveSceneToStorage();
        }

        // --- Selection Engine Processing ---
        function onPointerDown(event) {
            if (transformControls.axis !== null) return;

            const rect = viewport.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects, false);

            if (intersects.length > 0) {
                selectObject(intersects[0].object);
            } else {
                deselectObject();
            }
        }

        function selectObject(mesh) {
            selectedObject = mesh;
            transformControls.attach(mesh);
            
            selectionBoxHelper.setFromObject(mesh);
            selectionBoxHelper.visible = true;

            updateBrowserTree();
            
            propertiesEmpty.classList.add('hidden');
            propertiesPanel.classList.remove('hidden');
            updatePropertiesUI();
        }

        function deselectObject() {
            selectedObject = null;
            transformControls.detach();
            selectionBoxHelper.visible = false;
            
            updateBrowserTree();
            
            propertiesEmpty.classList.remove('hidden');
            propertiesPanel.classList.add('hidden');
        }

        // --- Dynamic View Mode Systems ---
        function setupViewModeControls() {
            const modes = {
                'solid': document.getElementById('view-solid'),
                'wireframe': document.getElementById('view-wireframe'),
                'xray': document.getElementById('view-xray')
            };

            Object.keys(modes).forEach(modeKey => {
                modes[modeKey].addEventListener('click', () => {
                    // Reset UI selections active headers
                    Object.values(modes).forEach(btn => btn.className = "px-2 py-0.5 rounded text-slate-400 hover:text-white");
                    modes[modeKey].className = "px-2 py-0.5 rounded bg-blue-600 text-white font-medium";

                    currentViewMode = modeKey;
                    
                    // Remap workspace elements active states
                    objects.forEach(obj => applyViewModeToMaterial(obj.material));
                });
            });
        }

        function applyViewModeToMaterial(material) {
            if (currentViewMode === 'wireframe') {
                material.wireframe = true;
                material.transparent = false;
                material.opacity = 1.0;
            } else if (currentViewMode === 'xray') {
                material.wireframe = false;
                material.transparent = true;
                material.opacity = 0.35;
            } else { // solid
                material.wireframe = false;
                material.transparent = false;
                material.opacity = 1.0;
            }
            material.needsUpdate = true;
        }

        // --- Structural Synchronization Matrix Updates (UI <-> Scene) ---
        function updateBrowserTree() {
            browserTree.innerHTML = '';
            
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                const isSelected = selectedObject === obj;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = `flex justify-between items-center pl-3 pr-1 py-1.5 rounded border transition-all ${isSelected ? 'bg-blue-950 border-blue-800 text-blue-400 font-medium' : 'bg-slate-900 border-slate-800 hover:border-slate-700 text-slate-400'}`;
                
                const nameSpan = document.createElement('span');
                nameSpan.className = "cursor-pointer truncate flex-1 select-none font-mono text-[11px]";
                nameSpan.innerText = obj.name;
                nameSpan.onclick = () => selectObject(obj);
                
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '&times;';
                deleteBtn.className = "text-sm text-slate-500 hover:text-red-400 px-2 transition-colors";
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteObject(obj);
                };

                itemDiv.appendChild(nameSpan);
                itemDiv.appendChild(deleteBtn);
                browserTree.appendChild(itemDiv);
            }
        }

        function updatePropertiesUI() {
            if (!selectedObject) return;

            document.getElementById('prop-name').value = selectedObject.name;
            
            // Positions Matrix Conversion values mapping
            document.getElementById('prop-pos-x').value = selectedObject.position.x.toFixed(2);
            document.getElementById('prop-pos-y').value = selectedObject.position.y.toFixed(2);
            document.getElementById('prop-pos-z').value = selectedObject.position.z.toFixed(2);

            // Scales Matrix Mapping 
            document.getElementById('prop-scale-x').value = selectedObject.scale.x.toFixed(2);
            document.getElementById('prop-scale-y').value = selectedObject.scale.y.toFixed(2);
            document.getElementById('prop-scale-z').value = selectedObject.scale.z.toFixed(2);

            // Rotations Math Vector Mapping (Euler conversion mapping direct degrees standard format display)
            document.getElementById('prop-rot-x').value = Math.round(THREE.MathUtils.radToDeg(selectedObject.rotation.x));
            document.getElementById('prop-rot-y').value = Math.round(THREE.MathUtils.radToDeg(selectedObject.rotation.y));
            document.getElementById('prop-rot-z').value = Math.round(THREE.MathUtils.radToDeg(selectedObject.rotation.z));

            document.getElementById('prop-color').value = '#' + selectedObject.material.color.getHexString();
        }

        function setupPropertyFieldListeners() {
            const executeUIPropertyTransformUpdates = () => {
                if (!selectedObject) return;
                
                selectedObject.name = document.getElementById('prop-name').value || selectedObject.name;
                
                selectedObject.position.set(
                    parseFloat(document.getElementById('prop-pos-x').value) || 0,
                    parseFloat(document.getElementById('prop-pos-y').value) || 0,
                    parseFloat(document.getElementById('prop-pos-z').value) || 0
                );

                selectedObject.scale.set(
                    parseFloat(document.getElementById('prop-scale-x').value) || 1,
                    parseFloat(document.getElementById('prop-scale-y').value) || 1,
                    parseFloat(document.getElementById('prop-scale-z').value) || 1
                );

                selectedObject.rotation.set(
                    THREE.MathUtils.degToRad(parseFloat(document.getElementById('prop-rot-x').value) || 0),
                    THREE.MathUtils.degToRad(parseFloat(document.getElementById('prop-rot-y').value) || 0),
                    THREE.MathUtils.degToRad(parseFloat(document.getElementById('prop-rot-z').value) || 0)
                );

                selectionBoxHelper.update();
                updateBrowserTree(); // Ensure live structural text renames visually map in panel
                saveSceneToStorage();
            };

            // Hook individual change monitoring paths
            ['prop-name', 'prop-pos-x', 'prop-pos-y', 'prop-pos-z', 'prop-scale-x', 'prop-scale-y', 'prop-scale-z', 'prop-rot-x', 'prop-rot-y', 'prop-rot-z']
            .forEach(id => {
                document.getElementById(id).addEventListener('input', executeUIPropertyTransformUpdates);
            });

            document.getElementById('prop-color').addEventListener('input', (e) => {
                if (selectedObject) {
                    selectedObject.material.color.set(e.target.value);
                    saveSceneToStorage();
                }
            });
        }

        // --- Data Memory Cleanup & Operations Actions ---
        function deleteObject(obj) {
            if (selectedObject === obj) deselectObject();

            scene.remove(obj);
            objects = objects.filter(o => o !== obj);

            obj.geometry.dispose();
            obj.material.dispose();

            updateBrowserTree();
            saveSceneToStorage();
        }

        function undoLastAction() {
            if (objects.length > 0) {
                deleteObject(objects[objects.length - 1]);
            }
        }

        function clearEntireWorkspace() {
            deselectObject();
            for (let i = objects.length - 1; i >= 0; i--) {
                scene.remove(objects[i]);
                objects[i].geometry.dispose();
                objects[i].material.dispose();
            }
            objects = [];
            updateBrowserTree();
            saveSceneToStorage();
        }

        // --- Industrial Persistence Architecture Pipeline (LocalStorage) ---
        function saveSceneToStorage() {
            const packedDataArray = objects.map(obj => ({
                name: obj.name,
                type: obj.userData.primitiveType,
                position: obj.position.toArray(),
                rotation: obj.rotation.toArray(), // Euler components mapping
                scale: obj.scale.toArray(),
                color: '#' + obj.material.color.getHexString()
            }));
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(packedDataArray));
        }

        function loadSceneFromStorage() {
            try {
                const storedRawString = localStorage.getItem(STORAGE_KEY);
                if (!storedRawString) return;

                const parsedConfigEntities = JSON.parse(storedRawString);
                parsedConfigEntities.forEach(entity => {
                    addObject(entity.type, entity);
                });
                
                deselectObject(); // Initialize in cleanly disconnected state
            } catch (err) {
                console.error("Critical execution breakdown mapping historical data states. Resetting.", err);
                localStorage.removeItem(STORAGE_KEY);
            }
        }

        // --- Professional STL File Export Handling Pipeline ---
        function exportToSTL() {
            if (objects.length === 0) {
                alert("Workspace contains no solid entity components to compile to file.");
                return;
            }

            // Unhook tracking systems prior to running spatial mesh compilation loop
            const temporaryActiveGizmoStateTarget = transformControls.object;
            transformControls.detach();
            selectionBoxHelper.visible = false;

            // Gather elements into clean context group to isolate from scene lights, helpers and grids
            const exportGroupWrapper = new THREE.Group();
            objects.forEach(mesh => {
                // Generate deep geometric copies to retain real-world positioning transformations
                const clone = mesh.clone();
                // Apply world positional matrix conversions to clean explicit relative modifications
                clone.applyMatrix4(mesh.matrixWorld);
                exportGroupWrapper.add(clone);
            });

            const exporter = new STLExporter();
            // Process context group extraction to ASCII text data formatting
            const generatedSTLOutputString = exporter.parse(exportGroupWrapper, { binary: false });

            // Package character raw data streams directly to localized download asset link
            const textBlobStream = new Blob([generatedSTLOutputString], { type: 'text/plain;charset=utf-8' });
            const temporaryAnchorDownloadLink = document.createElement('a');
            
            temporaryAnchorDownloadLink.href = URL.createObjectURL(textBlobStream);
            temporaryAnchorDownloadLink.download = `csr_cad_export_${Math.floor(Date.now() / 1000)}.stl`;
            document.body.appendChild(temporaryAnchorDownloadLink);
            temporaryAnchorDownloadLink.click();
            
            // Post Export Infrastructure Restorations
            document.body.removeChild(temporaryAnchorDownloadLink);
            if (temporaryActiveGizmoStateTarget) {
                selectObject(temporaryActiveGizmoStateTarget);
            }
        }

        // --- Core Render Loop Framework Mechanics ---
        function onWindowResize() {
            camera.aspect = viewport.clientWidth / viewport.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(viewport.clientWidth, viewport.clientHeight);
        }

        function animateEngine() {
            requestAnimationFrame(animateEngine);
            orbitControls.update(); 
            renderer.render(scene, camera);
        }
    </script>
</body>
