<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSR CAD Layout - Assembly Workspace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        /* UI Optimization & Custom Textures */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        
        .no-select { user-select: none; }
        
        /* Floating Draggable Panels Custom Styling */
        .floating-panel {
            position: absolute;
            z-index: 40;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
        }
        
        .panel-handle {
            cursor: move;
        }
    </style>
</head>
<body class="h-screen w-screen bg-slate-950 text-slate-100 overflow-hidden font-sans text-xs no-select relative">

    <header class="h-12 bg-slate-900 border-b border-slate-800 flex items-center px-4 justify-between shadow-lg z-50 relative">
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1.5">
                <span class="font-black text-sm tracking-wider text-blue-500">CSR</span>
                <span class="font-medium text-xs tracking-widest text-slate-400">CAD LAYOUT</span>
            </div>
            <div class="h-4 w-px bg-slate-800 mx-2"></div>
            <span class="text-slate-500 text-[10px] font-mono">WORKSPACE V1.0.0</span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex gap-2 text-slate-400 font-mono text-[10px] bg-slate-950 px-2.5 py-1 rounded border border-slate-800">
                <span><kbd class="text-blue-400 font-bold">W</kbd> Translate</span>
                <span class="text-slate-700">|</span>
                <span><kbd class="text-blue-400 font-bold">E</kbd> Rotate</span>
                <span class="text-slate-700">|</span>
                <span><kbd class="text-blue-400 font-bold">R</kbd> Scale</span>
                <span class="text-slate-700">|</span>
                <span><kbd class="text-red-400 font-bold">DEL</kbd> Remove</span>
            </div>
            <button id="btn-clear" class="px-3 py-1 bg-slate-800 hover:bg-red-950 hover:text-red-400 rounded border border-slate-700 transition-colors">Clear Assembly</button>
        </div>
    </header>

    <main id="viewport-container" class="w-full h-[calc(100vh-3rem)] relative bg-slate-950 outline-none" tabindex="0">
        
        <aside id="panel-library" class="floating-panel w-56 bg-slate-900/90 border border-slate-800 rounded-lg overflow-hidden top-4 left-4 flex flex-col">
            <div class="panel-handle p-2 bg-slate-800 border-b border-slate-700 flex items-center justify-between font-bold text-[10px] tracking-wider text-slate-300 uppercase">
                <span>📦 Parts Library</span>
                <span class="text-[9px] text-slate-500 font-mono">[Drag Header]</span>
            </div>
            <div class="p-3 space-y-4">
                <div>
                    <h4 class="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-2">Structural Metal</h4>
                    <div class="grid grid-cols-1 gap-1.5">
                        <button id="spawn-metal-cube" class="w-full text-left px-2.5 py-1.5 bg-slate-950 hover:bg-blue-950 border border-slate-800 rounded hover:border-blue-800 text-slate-300 transition-all flex items-center gap-2">
                            <span class="w-2 h-2 rounded-sm bg-slate-400 shadow-inner"></span> Metal Cube (Steel)
                        </button>
                        <button id="spawn-sheet-metal" class="w-full text-left px-2.5 py-1.5 bg-slate-950 hover:bg-blue-950 border border-slate-800 rounded hover:border-blue-800 text-slate-300 transition-all flex items-center gap-2">
                            <span class="w-3 h-0.5 bg-slate-400 shadow-inner"></span> Sheet Metal Plate
                        </button>
                    </div>
                </div>
                
                <div>
                    <h4 class="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-2">Kinematics</h4>
                    <div class="grid grid-cols-1 gap-1.5">
                        <button id="spawn-metal-gear" class="w-full text-left px-2.5 py-1.5 bg-slate-950 hover:bg-blue-950 border border-slate-800 rounded hover:border-blue-800 text-slate-300 transition-all flex items-center gap-2">
                            <span class="font-bold text-slate-400">⚙️</span> Procedural Metal Gear
                        </button>
                    </div>
                </div>

                <div>
                    <h4 class="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-2">Packaging</h4>
                    <div class="grid grid-cols-1 gap-1.5">
                        <button id="spawn-cardboard-cube" class="w-full text-left px-2.5 py-1.5 bg-slate-950 hover:bg-blue-950 border border-slate-800 rounded hover:border-blue-800 text-slate-300 transition-all flex items-center gap-2">
                            <span class="w-2 h-2 rounded-sm bg-amber-700"></span> Cardboard Cube
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <aside id="panel-properties" class="floating-panel w-64 bg-slate-900/90 border border-slate-800 rounded-lg overflow-hidden top-4 right-4 flex flex-col">
            <div class="panel-handle p-2 bg-slate-800 border-b border-slate-700 flex items-center justify-between font-bold text-[10px] tracking-wider text-slate-300 uppercase">
                <span>📋 Element Parameters</span>
                <span class="text-[9px] text-slate-500 font-mono">[Drag Header]</span>
            </div>
            
            <div id="properties-content" class="p-4 space-y-3.5 hidden">
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase font-mono mb-1">Component Name</label>
                    <div id="out-name" class="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-blue-400 font-mono font-bold"></div>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase font-mono mb-1">Material Assignment</label>
                    <div id="out-material" class="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-slate-300"></div>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase font-mono mb-1">Volumetric Footprint (X, Y, Z)</label>
                    <div class="grid grid-cols-3 gap-1 text-center font-mono">
                        <div class="bg-slate-950 border border-slate-800 rounded p-1.5">
                            <span class="block text-[9px] text-slate-600">W</span>
                            <span id="out-dim-x" class="text-slate-200 font-bold">-</span>
                        </div>
                        <div class="bg-slate-950 border border-slate-800 rounded p-1.5">
                            <span class="block text-[9px] text-slate-600">H</span>
                            <span id="out-dim-y" class="text-slate-200 font-bold">-</span>
                        </div>
                        <div class="bg-slate-950 border border-slate-800 rounded p-1.5">
                            <span class="block text-[9px] text-slate-600">D</span>
                            <span id="out-dim-z" class="text-slate-200 font-bold">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="properties-empty" class="p-6 text-center text-slate-500 tracking-wide leading-relaxed">
                No active asset selected in viewport cluster.
            </div>
        </aside>

    </main>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- Core Viewport Engine Variables ---
        let scene, camera, renderer;
        let orbitControls, transformControls;
        let raycaster, mouse;
        
        let assemblyObjects = [];
        let selectedElement = null;
        let selectionBoxHelper;
        
        let componentCounters = { metalCube: 1, sheetMetal: 1, metalGear: 1, cardboardCube: 1 };

        // --- Initialize Graphics and Interface Core ---
        initCADEngine();
        initializePanelDraggability();
        animateEngine();

        function initCADEngine() {
            const container = document.getElementById('viewport-container');

            // 1. Initial WebGL Configs
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x090d16); // High contrast dark canvas

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(10, 10, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 2. Metrology Systems Setup (Grids & Guides)
            const gridHelper = new THREE.GridHelper(30, 30, 0x334155, 0x1e293b);
            gridHelper.position.y = -0.005; // Prevent Z-fighting with thin sheet metal primitives
            scene.add(gridHelper);

            // 3. Realistic Materials Illumination Setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
            keyLight.position.set(10, 20, 10);
            scene.add(keyLight);

            const rimLight = new THREE.DirectionalLight(0x38bdf8, 0.25); // Engineering blue contrast light
            rimLight.position.set(-10, 10, -10);
            scene.add(rimLight);

            // 4. Transform Gizmo and Control Integration
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;

            transformControls = new TransformControls(camera, renderer.domElement);
            transformControls.size = 0.85;
            
            // Mitigate multi-control dragging event conflicts
            transformControls.addEventListener('dragging-changed', (event) => {
                orbitControls.enabled = !event.value;
            });
            transformControls.addEventListener('change', () => {
                if (selectedElement) {
                    selectionBoxHelper.update();
                    updatePropertiesDisplay();
                }
            });
            scene.add(transformControls);

            // 5. Targeting Raycaster & Selection Box Feedback Setup
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            selectionBoxHelper = new THREE.BoxHelper(new THREE.Mesh());
            selectionBoxHelper.material.color.setHex(0x3b82f6); // CSS blue-500 highlighting track
            selectionBoxHelper.visible = false;
            scene.add(selectionBoxHelper);

            // 6. Application Interactions Bindings Hooks
            window.addEventListener('resize', onWindowResize);
            container.addEventListener('pointerdown', onViewportPointerDown);
            window.addEventListener('keydown', handleKeyboardShortcuts);

            // Spawning UI Library Wire-ins
            document.getElementById('spawn-metal-cube').addEventListener('click', () => spawnPart('metalCube'));
            document.getElementById('spawn-sheet-metal').addEventListener('click', () => spawnPart('sheetMetal'));
            document.getElementById('spawn-metal-gear').addEventListener('click', () => spawnPart('metalGear'));
            document.getElementById('spawn-cardboard-cube').addEventListener('click', () => spawnPart('cardboardCube'));
            
            document.getElementById('btn-clear').addEventListener('click', clearAssemblyWorkspace);
        }

        // --- Procedural Generation & Real Materials Library Mapping ---
        function spawnPart(type) {
            let geometry;
            let material;
            let partName = '';
            let materialLabel = '';

            // Precise Engineering Material PBR Presets
            switch(type) {
                case 'metalCube':
                    geometry = new THREE.BoxGeometry(2, 2, 2);
                    material = new THREE.MeshStandardMaterial({
                        color: 0xcccccc,
                        metalness: 0.95,
                        roughness: 0.15
                    });
                    partName = `Steel_Cube_00${componentCounters.metalCube++}`;
                    materialLabel = "Polished Structural Steel (PBR)";
                    break;
                    
                case 'sheetMetal':
                    geometry = new THREE.BoxGeometry(4, 0.08, 3);
                    material = new THREE.MeshStandardMaterial({
                        color: 0xaaaaaa,
                        metalness: 0.85,
                        roughness: 0.25
                    });
                    partName = `Sheet_Metal_00${componentCounters.sheetMetal++}`;
                    materialLabel = "Galvanized Plate Aluminum";
                    break;

                case 'metalGear':
                    geometry = generateProceduralGearGeometry();
                    material = new THREE.MeshStandardMaterial({
                        color: 0x99aab5,
                        metalness: 0.9,
                        roughness: 0.3
                    });
                    partName = `Spur_Gear_00${componentCounters.metalGear++}`;
                    materialLabel = "Machined Carbon Steel";
                    break;

                case 'cardboardCube':
                    geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                    material = new THREE.MeshStandardMaterial({
                        color: 0xb58a55,
                        metalness: 0.0,
                        roughness: 0.85 // High roughness for a completely matte look
                    });
                    partName = `Box_Cardboard_00${componentCounters.cardboardCube++}`;
                    materialLabel = "Corrugated Matte Cardboard";
                    break;
            }

            const mesh = new THREE.Mesh(geometry, material);
            // Dynamic spawn positioning adjustments (keep objects resting cleanly atop grid standard floor)
            mesh.position.set(0, type === 'sheetMetal' ? 0.04 : (type === 'metalGear' ? 0.25 : (type === 'cardboardCube' ? 0.75 : 1)), 0);
            
            // Map parameters matrix markers to user data structures
            mesh.userData = { partName, materialLabel, baseGeometry: type };

            scene.add(mesh);
            assemblyObjects.push(mesh);
            
            selectElement(mesh);
        }

        // --- Extruded Cogwheel Geometry Generator ---
        function generateProceduralGearGeometry() {
            const gearShape = new THREE.Shape();
            const innerRadius = 0.6;
            const outerRadius = 0.9;
            const teethCount = 14;
            
            // Calculate a gear pattern by rotating segments sequentially
            for (let i = 0; i < teethCount; i++) {
                let angle = (i / teethCount) * Math.PI * 2;
                let nextAngle = ((i + 0.5) / teethCount) * Math.PI * 2;
                let stepAngle = ((i + 1) / teethCount) * Math.PI * 2;

                gearShape.lineTo(Math.cos(angle) * innerRadius, Math.sin(angle) * innerRadius);
                gearShape.lineTo(Math.cos(angle) * outerRadius, Math.sin(angle) * outerRadius);
                gearShape.lineTo(Math.cos(nextAngle) * outerRadius, Math.sin(nextAngle) * outerRadius);
                gearShape.lineTo(Math.cos(nextAngle) * innerRadius, Math.sin(nextAngle) * innerRadius);
            }
            gearShape.closePath();

            // Extrude options to create an organic solid block footprint
            const extrudeSettings = { depth: 0.5, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.02, bevelThickness: 0.02 };
            const geometry = new THREE.ExtrudeGeometry(gearShape, extrudeSettings);
            geometry.center();
            geometry.rotateX(Math.PI / 2); // Orient gear to lay flat naturally upon grid floor
            
            return geometry;
        }

        // --- Advanced Engine Interaction Selection Mechanics ---
        function onViewportPointerDown(event) {
            if (transformControls.axis !== null) return;

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(assemblyObjects, true);

            if (intersects.length > 0) {
                // Route target extraction processing upward if hitting a sub-component mesh segment
                let rootObject = intersects[0].object;
                while (rootObject.parent && rootObject.parent !== scene) {
                    rootObject = rootObject.parent;
                }
                selectElement(rootObject);
            } else {
                deselectElement();
            }
        }

        function selectElement(mesh) {
            selectedElement = mesh;
            transformControls.attach(mesh);
            
            selectionBoxHelper.setFromObject(mesh);
            selectionBoxHelper.visible = true;

            document.getElementById('properties-empty').classList.add('hidden');
            document.getElementById('properties-content').classList.remove('hidden');
            updatePropertiesDisplay();
        }

        function deselectElement() {
            selectedElement = null;
            transformControls.detach();
            selectionBoxHelper.visible = false;

            document.getElementById('properties-empty').classList.remove('hidden');
            document.getElementById('properties-content').classList.add('hidden');
        }

        function handleKeyboardShortcuts(event) {
            if (document.activeElement.tagName === 'INPUT') return;

            switch (event.key.toLowerCase()) {
                case 'w': transformControls.setMode('translate'); break;
                case 'e': transformControls.setMode('rotate'); break;
                case 'r': transformControls.setMode('scale'); break;
                case 'delete':
                case 'backspace':
                    if (selectedElement) removeSelectedElement();
                    break;
            }
        }

        // --- UI Panel Output Parameters Refresher ---
        function updatePropertiesDisplay() {
            if (!selectedElement) return;

            document.getElementById('out-name').innerText = selectedElement.userData.partName;
            document.getElementById('out-material').innerText = selectedElement.userData.materialLabel;

            // Generate structural metrics bound dimensions bounding updates safely
            const boundingBox = new THREE.Box3().setFromObject(selectedElement);
            const sizeVector = new THREE.Vector3();
            boundingBox.getSize(sizeVector);

            document.getElementById('out-dim-x').innerText = sizeVector.x.toFixed(2);
            document.getElementById('out-dim-y').innerText = sizeVector.y.toFixed(2);
            document.getElementById('out-dim-z').innerText = sizeVector.z.toFixed(2);
        }

        // --- Memory Cleanup Procedures ---
        function removeSelectedElement() {
            if (!selectedElement) return;
            const target = selectedElement;
            deselectElement();

            scene.remove(target);
            assemblyObjects = assemblyObjects.filter(obj => obj !== target);
            
            // Dispose geometries and materials to avoid memory leaks
            if (target.geometry) target.geometry.dispose();
            if (target.material) target.material.dispose();
        }

        function clearAssemblyWorkspace() {
            deselectElement();
            assemblyObjects.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) obj.material.dispose();
            });
            assemblyObjects = [];
        }

        // --- Custom Workspace Draggable Sidebar Mechanics ---
        function initializePanelDraggability() {
            const panels = document.querySelectorAll('.floating-panel');

            panels.forEach(panel => {
                const handle = panel.querySelector('.panel-handle');
                let isDragging = false;
                let offsetLeft, offsetTop;

                handle.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    offsetLeft = e.clientX - panel.offsetLeft;
                    offsetTop = e.clientY - panel.offsetTop;
                    panel.classList.add('opacity-80');
                    
                    // Put current dragged panel on top
                    panels.forEach(p => p.style.zIndex = "40");
                    panel.style.zIndex = "45";
                });

                window.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    
                    // Clamp layout boundaries to window space bounds
                    let targetX = e.clientX - offsetLeft;
                    let targetY = e.clientY - offsetTop;
                    
                    targetX = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, targetX));
                    targetY = Math.max(48, Math.min(window.innerHeight - panel.offsetHeight, targetY)); // Clamp 48px below header track

                    panel.style.left = `${targetX}px`;
                    panel.style.top = `${targetY}px`;
                });

                window.addEventListener('mouseup', () => {
                    if (!isDragging) return;
                    isDragging = false;
                    panel.classList.remove('opacity-80');
                });
            });
        }

        // --- Main Rendering Loop Pipeline ---
        function onWindowResize() {
            const container = document.getElementById('viewport-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animateEngine() {
            requestAnimationFrame(animateEngine);
            orbitControls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
