<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSR CAD Layout - Advanced Transformation Deck</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        /* UI Application Tuning */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        
        .no-select { user-select: none; }
        
        /* Draggable Panels Framework Architecture */
        .floating-panel {
            position: absolute;
            z-index: 40;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
        }
        
        .panel-handle { cursor: move; }
    </style>
</head>
<body class="h-screen w-screen bg-slate-950 text-slate-100 overflow-hidden font-sans text-xs no-select relative">

    <header class="h-12 bg-slate-900 border-b border-slate-800 flex items-center px-4 justify-between shadow-lg z-50 relative">
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1.5">
                <span class="font-black text-sm tracking-wider text-blue-500">CSR</span>
                <span class="font-medium text-xs tracking-widest text-slate-400">CAD LAYOUT v2.0</span>
            </div>
            <div class="h-4 w-px bg-slate-800 mx-2"></div>
            
            <div class="flex items-center bg-slate-950 rounded p-0.5 border border-slate-800 font-mono text-[10px]">
                <button id="mode-move" class="px-2.5 py-1 rounded bg-blue-600 text-white font-medium transition-all" title="Shortcut: W">Move [W]</button>
                <button id="mode-rotate" class="px-2.5 py-1 rounded text-slate-400 hover:text-white transition-all" title="Shortcut: E">Rotate [E]</button>
                <button id="mode-thickness" class="px-2.5 py-1 rounded text-slate-400 hover:text-white transition-all" title="Shortcut: T">Thickness Locked [T]</button>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <span class="text-slate-500 text-[10px] font-mono hidden md:inline">SYSTEM STATE: NOMINAL</span>
            <button id="btn-clear" class="px-3 py-1 bg-slate-800 hover:bg-red-950 hover:text-red-400 rounded border border-slate-700 transition-colors">Clear Space</button>
        </div>
    </header>

    <main id="viewport-container" class="w-full h-[calc(100vh-3rem)] relative bg-slate-950 outline-none" tabindex="0">
        
        <aside id="panel-library" class="floating-panel w-56 bg-slate-900/90 border border-slate-800 rounded-lg overflow-hidden top-4 left-4 flex flex-col">
            <div class="panel-handle p-2 bg-slate-800 border-b border-slate-700 flex items-center justify-between font-bold text-[10px] tracking-wider text-slate-300 uppercase">
                <span>📦 Parts Library</span>
                <span class="text-[9px] text-slate-500 font-mono">[Drag]</span>
            </div>
            <div class="p-3 space-y-4">
                <div>
                    <h4 class="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-2">Structural Metal</h4>
                    <div class="grid grid-cols-1 gap-1.5">
                        <button id="spawn-metal-cube" class="w-full text-left px-2.5 py-1.5 bg-slate-950 hover:bg-blue-950 border border-slate-800 rounded hover:border-blue-800 text-slate-300 transition-all flex items-center gap-2">
                            <span class="w-2 h-2 rounded-sm bg-slate-400 shadow-inner"></span> Metal Cube (Steel)
                        </button>
                        <button id="spawn-sheet-metal" class="w-full text-left px-2.5 py-1.5 bg-slate-950 hover:bg-blue-950 border border-slate-800 rounded hover:border-blue-800 text-slate-300 transition-all flex items-center gap-2">
                            <span class="w-3 h-0.5 bg-slate-400 shadow-inner"></span> Sheet Metal Plate
                        </button>
                    </div>
                </div>
                <div>
                    <h4 class="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-2">Kinematics</h4>
                    <div class="grid grid-cols-1 gap-1.5">
                        <button id="spawn-metal-gear" class="w-full text-left px-2.5 py-1.5 bg-slate-950 hover:bg-blue-950 border border-slate-800 rounded hover:border-blue-800 text-slate-300 transition-all flex items-center gap-2">
                            <span class="font-bold text-slate-400">⚙️</span> Procedural Metal Gear
                        </button>
                    </div>
                </div>
                <div>
                    <h4 class="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-2">Packaging</h4>
                    <div class="grid grid-cols-1 gap-1.5">
                        <button id="spawn-cardboard-cube" class="w-full text-left px-2.5 py-1.5 bg-slate-950 hover:bg-blue-950 border border-slate-800 rounded hover:border-blue-800 text-slate-300 transition-all flex items-center gap-2">
                            <span class="w-2 h-2 rounded-sm bg-amber-700"></span> Cardboard Cube
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <aside id="panel-properties" class="floating-panel w-64 bg-slate-900/90 border border-slate-800 rounded-lg overflow-hidden top-4 right-4 flex flex-col">
            <div class="panel-handle p-2 bg-slate-800 border-b border-slate-700 flex items-center justify-between font-bold text-[10px] tracking-wider text-slate-300 uppercase">
                <span>📋 Transformation Engine</span>
                <span class="text-[9px] text-slate-500 font-mono">[Drag]</span>
            </div>
            
            <div id="properties-content" class="p-4 space-y-4 hidden">
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase font-mono mb-1">Component ID</label>
                    <div id="out-name" class="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-blue-400 font-mono font-bold truncate"></div>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase font-mono mb-1">Material Specification</label>
                    <div id="out-material" class="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-slate-400 truncate"></div>
                </div>

                <div class="h-px bg-slate-800 my-2"></div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-[10px] text-slate-400 uppercase font-mono">Axis Rotation (Y-Axis)</label>
                        <span id="label-rot-y" class="font-mono text-blue-400 font-bold">0°</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="range" id="input-rot-y" min="0" max="360" value="0" class="w-full accent-blue-500 bg-slate-950 h-1.5 rounded cursor-pointer">
                        <input type="number" id="num-rot-y" min="0" max="360" value="0" class="w-14 bg-slate-950 border border-slate-800 rounded px-1 py-0.5 font-mono text-center text-slate-200">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-[10px] text-slate-400 uppercase font-mono">Component Thickness (Y-Dim)</label>
                        <span id="label-thickness" class="font-mono text-emerald-400 font-bold">1.00x</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="range" id="input-thickness" min="0.05" max="4.00" step="0.05" value="1.00" class="w-full accent-emerald-500 bg-slate-950 h-1.5 rounded cursor-pointer">
                        <input type="number" id="num-thickness" min="0.05" max="4.00" step="0.05" value="1.00" class="w-14 bg-slate-950 border border-slate-800 rounded px-1 py-0.5 font-mono text-center text-slate-200">
                    </div>
                </div>
            </div>

            <div id="properties-empty" class="p-6 text-center text-slate-500 tracking-wide leading-relaxed">
                Awaiting viewport interaction to focus element matrix components.
            </div>
        </aside>

    </main>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- Workspace Global Engine Allocation ---
        let scene, camera, renderer;
        let orbitControls, transformControls;
        let raycaster, mouse;
        
        let assemblyObjects = [];
        let selectedElement = null;
        let selectionBoxHelper;
        
        let currentGizmoMode = 'translate'; // Default 'translate', 'rotate', 'scale'
        let componentCounters = { metalCube: 1, sheetMetal: 1, metalGear: 1, cardboardCube: 1 };

        // --- Bootstrapping Execution Loop ---
        initCADLayoutEngine();
        initializePanelDraggability();
        animateEngine();

        function initCADLayoutEngine() {
            const container = document.getElementById('viewport-container');

            // 1. WebGL Component Mapping
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x090d16);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(10, 10, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 2. Geometric Measurement Metric Spaces
            const gridHelper = new THREE.GridHelper(30, 30, 0x334155, 0x1e293b);
            gridHelper.position.y = -0.005;
            scene.add(gridHelper);

            // 3. Realistic PBR Material Shading Illumination Channels
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
            scene.add(ambientLight);

            const directionalKeyLight = new THREE.DirectionalLight(0xffffff, 0.85);
            directionalKeyLight.position.set(12, 24, 12);
            scene.add(directionalKeyLight);

            const fillBlueLight = new THREE.DirectionalLight(0x38bdf8, 0.2);
            fillBlueLight.position.set(-12, 10, -12);
            scene.add(fillBlueLight);

            // 4. Advanced Interaction Controls Mapping
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;

            transformControls = new TransformControls(camera, renderer.domElement);
            transformControls.size = 0.85;
            
            // Handle control lock state transitions cleanly
            transformControls.addEventListener('dragging-changed', (event) => {
                orbitControls.enabled = !event.value;
            });
            transformControls.addEventListener('change', () => {
                if (selectedElement) {
                    // Update visual helper track
                    selectionBoxHelper.update();
                    
                    // If modified via viewport gizmo, synchronize data properties backwards to UI sliders
                    synchronizeObjectToUI();
                }
            });
            scene.add(transformControls);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            selectionBoxHelper = new THREE.BoxHelper(new THREE.Mesh());
            selectionBoxHelper.material.color.setHex(0x3b82f6);
            selectionBoxHelper.visible = false;
            scene.add(selectionBoxHelper);

            // 5. Interface Core Actions Mounting Setup
            window.addEventListener('resize', onWindowResize);
            container.addEventListener('pointerdown', onViewportPointerDown);
            window.addEventListener('keydown', handleKeyboardShortcuts);

            // Spawning Toolbar Links
            document.getElementById('spawn-metal-cube').addEventListener('click', () => spawnLibraryPart('metalCube'));
            document.getElementById('spawn-sheet-metal').addEventListener('click', () => spawnLibraryPart('sheetMetal'));
            document.getElementById('spawn-metal-gear').addEventListener('click', () => spawnLibraryPart('metalGear'));
            document.getElementById('spawn-cardboard-cube').addEventListener('click', () => spawnLibraryPart('cardboardCube'));
            
            document.getElementById('btn-clear').addEventListener('click', clearAssemblyWorkspaceSpace);

            // Transformation Workflow Mode Switch Button Bindings
            setupGizmoModeButtons();

            // Direct Parameter Manual Configuration Listeners
            setupManualPropertyMatrixListeners();
        }

        // --- Procedural Component & Material Library Generators ---
        function spawnLibraryPart(type) {
            let geometry;
            let material;
            let partName = '';
            let materialLabel = '';

            switch(type) {
                case 'metalCube':
                    geometry = new THREE.BoxGeometry(2, 2, 2);
                    material = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.95, roughness: 0.12 });
                    partName = `Steel_Cube_00${componentCounters.metalCube++}`;
                    materialLabel = "Polished Structural Steel";
                    break;
                    
                case 'sheetMetal':
                    geometry = new THREE.BoxGeometry(4, 0.08, 3);
                    material = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.85, roughness: 0.22 });
                    partName = `Sheet_Plate_00${componentCounters.sheetMetal++}`;
                    materialLabel = "Galvanized Plate Aluminum";
                    break;

                case 'metalGear':
                    geometry = generateProceduralSpurGearGeometry();
                    material = new THREE.MeshStandardMaterial({ color: 0x99aab5, metalness: 0.92, roughness: 0.28 });
                    partName = `Spur_Gear_00${componentCounters.metalGear++}`;
                    materialLabel = "Machined Carbon Steel Piece";
                    break;

                case 'cardboardCube':
                    geometry = new THREE.BoxGeometry(1.6, 1.6, 1.6);
                    material = new THREE.MeshStandardMaterial({ color: 0xb58a55, metalness: 0.0, roughness: 0.9 });
                    partName = `Box_Cardboard_00${componentCounters.cardboardCube++}`;
                    materialLabel = "Corrugated Kraft Cardboard";
                    break;
            }

            const mesh = new THREE.Mesh(geometry, material);
            
            // Adjust elevation offsets so objects sit natively on top of the grid plane
            mesh.position.set(0, type === 'sheetMetal' ? 0.04 : (type === 'metalGear' ? 0.25 : (type === 'cardboardCube' ? 0.8 : 1)), 0);
            
            // Enforce structural identity data tags
            mesh.userData = { partName, materialLabel, baseGeometry: type };

            scene.add(mesh);
            assemblyObjects.push(mesh);
            
            selectWorkspaceElement(mesh);
        }

        function generateProceduralSpurGearGeometry() {
            const gearShape = new THREE.Shape();
            const innerRadius = 0.65;
            const outerRadius = 0.95;
            const teethCount = 16;
            
            for (let i = 0; i < teethCount; i++) {
                let angle = (i / teethCount) * Math.PI * 2;
                let nextAngle = ((i + 0.5) / teethCount) * Math.PI * 2;
                let stepAngle = ((i + 1) / teethCount) * Math.PI * 2;

                gearShape.lineTo(Math.cos(angle) * innerRadius, Math.sin(angle) * innerRadius);
                gearShape.lineTo(Math.cos(angle) * outerRadius, Math.sin(angle) * outerRadius);
                gearShape.lineTo(Math.cos(nextAngle) * outerRadius, Math.sin(nextAngle) * outerRadius);
                gearShape.lineTo(Math.cos(nextAngle) * innerRadius, Math.sin(nextAngle) * innerRadius);
            }
            gearShape.closePath();

            const extrudeSettings = { depth: 0.5, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.015, bevelThickness: 0.015 };
            const geometry = new THREE.ExtrudeGeometry(gearShape, extrudeSettings);
            geometry.center();
            geometry.rotateX(Math.PI / 2); // Flatten configuration relative to coordinate frames
            return geometry;
        }

        // --- Advanced Core Fusion Gizmo Workflow Transformation State Controls ---
        function setTransformationMode(mode) {
            const btnMove = document.getElementById('mode-move');
            const btnRotate = document.getElementById('mode-rotate');
            const btnThickness = document.getElementById('mode-thickness');

            // Reset CSS Styling Selection Matrix
            [btnMove, btnRotate, btnThickness].forEach(btn => btn.className = "px-2.5 py-1 rounded text-slate-400 hover:text-white transition-all");

            if (mode === 'translate') {
                btnMove.className = "px-2.5 py-1 rounded bg-blue-600 text-white font-medium transition-all";
                transformControls.setMode('translate');
                transformControls.showX = true;
                transformControls.showY = true;
                transformControls.showZ = true;
            } else if (mode === 'rotate') {
                btnRotate.className = "px-2.5 py-1 rounded bg-blue-600 text-white font-medium transition-all";
                transformControls.setMode('rotate');
                transformControls.showX = true;
                transformControls.showY = true; // Full unlocked 3-axis rotation space
                transformControls.showZ = true;
            } else if (mode === 'thickness') {
                btnThickness.className = "px-2.5 py-1 rounded bg-emerald-600 text-white font-medium transition-all";
                
                // Enforce "Thickness Mode" - Set mode to scale, but lock down user manipulation to the Y-axis exclusively
                transformControls.setMode('scale');
                transformControls.showX = false;
                transformControls.showY = true;  // Lock processing down to height thickness adjustments only
                transformControls.showZ = false;
            }
            currentGizmoMode = mode;
        }

        function setupGizmoModeButtons() {
            document.getElementById('mode-move').addEventListener('click', () => setTransformationMode('translate'));
            document.getElementById('mode-rotate').addEventListener('click', () => setTransformationMode('rotate'));
            document.getElementById('mode-thickness').addEventListener('click', () => setTransformationMode('thickness'));
        }

        // --- Core Selection Handlers ---
        function onViewportPointerDown(event) {
            if (transformControls.axis !== null) return;

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(assemblyObjects, true);

            if (intersects.length > 0) {
                let rootObject = intersects[0].object;
                while (rootObject.parent && rootObject.parent !== scene) {
                    rootObject = rootObject.parent;
                }
                selectWorkspaceElement(rootObject);
            } else {
                deselectWorkspaceElement();
            }
        }

        function selectWorkspaceElement(mesh) {
            selectedElement = mesh;
            transformControls.attach(mesh);
            
            selectionBoxHelper.setFromObject(mesh);
            selectionBoxHelper.visible = true;

            document.getElementById('properties-empty').classList.add('hidden');
            document.getElementById('properties-content').classList.remove('hidden');
            
            // Restore actual transformation limits settings constraints matching global modes state tracker
            setTransformationMode(currentGizmoMode);
            synchronizeObjectToUI();
        }

        function deselectWorkspaceElement() {
            selectedElement = null;
            transformControls.detach();
            selectionBoxHelper.visible = false;

            document.getElementById('properties-empty').classList.remove('hidden');
            document.getElementById('properties-content').classList.add('hidden');
        }

        function handleKeyboardShortcuts(event) {
            if (document.activeElement.tagName === 'INPUT') return;

            switch (event.key.toLowerCase()) {
                case 'w': setTransformationMode('translate'); break;
                case 'e': setTransformationMode('rotate'); break;
                case 't': setTransformationMode('thickness'); break;
                case 'delete':
                case 'backspace':
                    if (selectedElement) removeFocusedElement();
                    break;
            }
        }

        // --- Manual Input Parameters Pipeline Synchronization System ---
        function synchronizeObjectToUI() {
            if (!selectedElement) return;

            document.getElementById('out-name').innerText = selectedElement.userData.partName;
            document.getElementById('out-material').innerText = selectedElement.userData.materialLabel;

            // 1. Process Y-Axis Euler Rotation Angles Mapping
            let currentRadY = selectedElement.rotation.y;
            // Normalize radian parameters loop bound sequences cleanly to 0-360 range
            let degreesY = Math.round(THREE.MathUtils.radToDeg(currentRadY)) % 360;
            if (degreesY < 0) degreesY += 360;

            document.getElementById('input-rot-y').value = degreesY;
            document.getElementById('num-rot-y').value = degreesY;
            document.getElementById('label-rot-y').innerText = `${degreesY}°`;

            // 2. Process Y-Scale (Thickness Mapping Profile)
            let thicknessFactor = selectedElement.scale.y;
            document.getElementById('input-thickness').value = thicknessFactor.toFixed(2);
            document.getElementById('num-thickness').value = thicknessFactor.toFixed(2);
            document.getElementById('label-thickness').innerText = `${thicknessFactor.toFixed(2)}x`;
        }

        function setupManualPropertyMatrixListeners() {
            const sliderRotY = document.getElementById('input-rot-y');
            const numRotY = document.getElementById('num-rot-y');
            const sliderThickness = document.getElementById('input-thickness');
            const numThickness = document.getElementById('num-thickness');

            // Linked Y-Axis Rotation Triggers Pipeline
            const executeRotationYModification = (val) => {
                if (!selectedElement) return;
                let targetDegrees = parseInt(val) || 0;
                
                // Enforce physical boundary checks
                if(targetDegrees < 0) targetDegrees = 0;
                if(targetDegrees > 360) targetDegrees = 360;

                selectedElement.rotation.y = THREE.MathUtils.degToRad(targetDegrees);
                
                // Keep input interfaces synchronized
                sliderRotY.value = targetDegrees;
                numRotY.value = targetDegrees;
                document.getElementById('label-rot-y').innerText = `${targetDegrees}°`;
                selectionBoxHelper.update();
            };

            sliderRotY.addEventListener('input', (e) => executeRotationYModification(e.target.value));
            numRotY.addEventListener('input', (e) => executeRotationYModification(e.target.value));

            // Linked Geometric Local Thickness Scale Triggers Pipeline
            const executeThicknessScaleModification = (val) => {
                if (!selectedElement) return;
                let targetScaleY = parseFloat(val) || 1.00;

                // Protect against critical structural inversion math failures (zero space collapses)
                if (targetScaleY < 0.05) targetScaleY = 0.05;
                if (targetScaleY > 4.00) targetScaleY = 4.00;

                selectedElement.scale.y = targetScaleY;
                
                // Keep input interfaces synchronized
                sliderThickness.value = targetScaleY.toFixed(2);
                numThickness.value = targetScaleY.toFixed(2);
                document.getElementById('label-thickness').innerText = `${targetScaleY.toFixed(2)}x`;
                selectionBoxHelper.update();
            };

            sliderThickness.addEventListener('input', (e) => executeThicknessScaleModification(e.target.value));
            numThickness.addEventListener('input', (e) => executeThicknessScaleModification(e.target.value));
        }

        // --- Memory Operations Cleanup Actions ---
        function removeFocusedElement() {
            if (!selectedElement) return;
            const targetMesh = selectedElement;
            deselectWorkspaceElement();

            scene.remove(targetMesh);
            assemblyObjects = assemblyObjects.filter(obj => obj !== targetMesh);
            
            if (targetMesh.geometry) targetMesh.geometry.dispose();
            if (targetMesh.material) targetMesh.material.dispose();
        }

        function clearAssemblyWorkspaceSpace() {
            deselectWorkspaceElement();
            assemblyObjects.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) obj.material.dispose();
            });
            assemblyObjects = [];
        }

        // --- UI Native Panel Mouse-Dragging Engine ---
        function initializePanelDraggability() {
            const panels = document.querySelectorAll('.floating-panel');

            panels.forEach(panel => {
                const handle = panel.querySelector('.panel-handle');
                let isDragging = false;
                let offsetLeft, offsetTop;

                handle.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    offsetLeft = e.clientX - panel.offsetLeft;
                    offsetTop = e.clientY - panel.offsetTop;
                    panel.classList.add('opacity-75');
                    
                    panels.forEach(p => p.style.zIndex = "40");
                    panel.style.zIndex = "45";
                });

                window.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    
                    let computedLeft = e.clientX - offsetLeft;
                    let computedTop = e.clientY - offsetTop;
                    
                    // Clamp component bounding alignments within screen display viewing frames safely
                    computedLeft = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, computedLeft));
                    computedTop = Math.max(48, Math.min(window.innerHeight - panel.offsetHeight, computedTop)); // Offset below header element

                    panel.style.left = `${computedLeft}px`;
                    panel.style.top = `${computedTop}px`;
                });

                window.addEventListener('mouseup', () => {
                    if (!isDragging) return;
                    isDragging = false;
                    panel.classList.remove('opacity-75');
                });
            });
        }

        // --- Core Render Pipeline Loops ---
        function onWindowResize() {
            const container = document.getElementById('viewport-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animateEngine() {
            requestAnimationFrame(animateEngine);
            orbitControls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
