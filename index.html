<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web CAD Prototype | Fusion Style</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        /* Custom scrollbar for a native software feel */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        /* Prevent selection highlighting on UI elements */
        .no-select { user-select: none; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col bg-gray-900 text-gray-200 overflow-hidden font-sans text-sm no-select">

    <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between shrink-0 shadow-md z-10">
        <div class="flex items-center gap-2">
            <span class="font-bold text-white mr-4">WebCAD</span>
            <button id="btn-cube" class="px-3 py-1.5 bg-gray-700 hover:bg-blue-600 rounded text-xs font-medium transition-colors">Add Cube</button>
            <button id="btn-sphere" class="px-3 py-1.5 bg-gray-700 hover:bg-blue-600 rounded text-xs font-medium transition-colors">Add Sphere</button>
            <button id="btn-cylinder" class="px-3 py-1.5 bg-gray-700 hover:bg-blue-600 rounded text-xs font-medium transition-colors">Add Cylinder</button>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-undo" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-xs font-medium transition-colors">Undo Add</button>
            <button id="btn-clear" class="px-3 py-1.5 bg-red-900 hover:bg-red-700 text-white rounded text-xs font-medium transition-colors">Clear Scene</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col shrink-0">
            <div class="p-2 border-b border-gray-700 bg-gray-800 font-semibold text-xs tracking-wider text-gray-400 uppercase">
                Browser
            </div>
            <div id="browser-tree" class="flex-1 overflow-y-auto p-2 flex flex-col gap-1">
                </div>
        </aside>

        <div id="viewport" class="flex-1 relative cursor-crosshair outline-none" tabindex="0">
            </div>

        <aside class="w-72 bg-gray-800 border-l border-gray-700 flex flex-col shrink-0">
            <div class="p-2 border-b border-gray-700 bg-gray-800 font-semibold text-xs tracking-wider text-gray-400 uppercase">
                Properties
            </div>
            <div id="properties-panel" class="flex-1 overflow-y-auto p-4 hidden">
                
                <div class="mb-4">
                    <label class="block text-xs text-gray-400 mb-1">Name</label>
                    <input type="text" id="prop-name" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none focus:border-blue-500" disabled>
                </div>

                <div class="mb-4">
                    <label class="block text-xs text-gray-400 mb-1">Position (X, Y, Z)</label>
                    <div class="flex gap-2">
                        <input type="number" id="prop-pos-x" step="0.5" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none focus:border-blue-500">
                        <input type="number" id="prop-pos-y" step="0.5" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none focus:border-blue-500">
                        <input type="number" id="prop-pos-z" step="0.5" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs text-gray-400 mb-1">Scale (X, Y, Z)</label>
                    <div class="flex gap-2">
                        <input type="number" id="prop-scale-x" step="0.1" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none focus:border-blue-500">
                        <input type="number" id="prop-scale-y" step="0.1" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none focus:border-blue-500">
                        <input type="number" id="prop-scale-z" step="0.1" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs text-gray-400 mb-1">Material Color</label>
                    <input type="color" id="prop-color" class="w-full h-8 bg-gray-900 border border-gray-600 rounded cursor-pointer">
                </div>

            </div>
            
            <div id="properties-empty" class="flex-1 flex items-center justify-center text-gray-500 p-4 text-center">
                Select an object to view and edit its properties.
            </div>
        </aside>

    </main>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- Core Variables ---
        let scene, camera, renderer;
        let orbitControls, transformControls;
        let raycaster, mouse;
        
        // State management
        let objects = []; // Holds all interactive meshes
        let selectedObject = null;
        let objectCounter = 1;
        
        // Visual helpers
        let selectionBoxHelper; 

        // DOM Elements
        const viewport = document.getElementById('viewport');
        const browserTree = document.getElementById('browser-tree');
        const propertiesPanel = document.getElementById('properties-panel');
        const propertiesEmpty = document.getElementById('properties-empty');
        
        // Initialization
        init();
        animate();

        function init() {
            // 1. Setup Scene, Camera, Renderer
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111827); // Tailwind gray-900

            camera = new THREE.PerspectiveCamera(50, viewport.clientWidth / viewport.clientHeight, 0.1, 1000);
            camera.position.set(15, 15, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(viewport.clientWidth, viewport.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            viewport.appendChild(renderer.domElement);

            // 2. Environment (Grid & Lights)
            const gridHelper = new THREE.GridHelper(50, 50, 0x4b5563, 0x374151); // CAD-like grid
            scene.add(gridHelper);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 3. Setup Controls
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;

            transformControls = new TransformControls(camera, renderer.domElement);
            // Disable OrbitControls while dragging the Transform gizmo
            transformControls.addEventListener('dragging-changed', function (event) {
                orbitControls.enabled = !event.value;
            });
            // Update UI and BoxHelper while object is being dragged/scaled
            transformControls.addEventListener('change', () => {
                if (selectedObject) {
                    updatePropertiesUI();
                    selectionBoxHelper.update();
                }
            });
            scene.add(transformControls);

            // 4. Setup Selection Helpers (Raycaster & Bounding Box)
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            selectionBoxHelper = new THREE.BoxHelper(new THREE.Mesh());
            selectionBoxHelper.material.color.setHex(0x3b82f6); // Tailwind blue-500
            selectionBoxHelper.visible = false;
            scene.add(selectionBoxHelper);

            // 5. Event Listeners
            window.addEventListener('resize', onWindowResize);
            viewport.addEventListener('pointerdown', onPointerDown);

            // Toolbar Buttons
            document.getElementById('btn-cube').addEventListener('click', () => addObject('cube'));
            document.getElementById('btn-sphere').addEventListener('click', () => addObject('sphere'));
            document.getElementById('btn-cylinder').addEventListener('click', () => addObject('cylinder'));
            
            document.getElementById('btn-undo').addEventListener('click', undoLastObject);
            document.getElementById('btn-clear').addEventListener('click', clearScene);

            // Property Panel Inputs Event Listeners
            setupPropertyListeners();
        }

        // --- Object Creation ---
        function addObject(type) {
            let geometry;
            let material = new THREE.MeshStandardMaterial({ 
                color: Math.random() * 0xffffff, 
                roughness: 0.3, 
                metalness: 0.2 
            });

            switch(type) {
                case 'cube': geometry = new THREE.BoxGeometry(2, 2, 2); break;
                case 'sphere': geometry = new THREE.SphereGeometry(1.5, 32, 16); break;
                case 'cylinder': geometry = new THREE.CylinderGeometry(1, 1, 3, 32); break;
            }

            const mesh = new THREE.Mesh(geometry, material);
            // Place object slightly above grid
            mesh.position.y = type === 'cube' ? 1 : 1.5; 
            
            // Assign a unique ID/Name for the browser tree
            mesh.name = `${type.charAt(0).toUpperCase() + type.slice(1)} ${objectCounter++}`;
            mesh.userData.id = THREE.MathUtils.generateUUID();

            scene.add(mesh);
            objects.push(mesh);
            
            updateBrowserTree();
            selectObject(mesh);
        }

        // --- Interaction & Selection ---
        function onPointerDown(event) {
            // Ignore clicks if clicking on the TransformControls gizmo
            if (transformControls.axis !== null) return;

            // Calculate mouse position in normalized device coordinates (-1 to +1)
            const rect = viewport.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersect against our list of objects
            const intersects = raycaster.intersectObjects(objects, false);

            if (intersects.length > 0) {
                selectObject(intersects[0].object);
            } else {
                deselectObject();
            }
        }

        function selectObject(mesh) {
            selectedObject = mesh;
            
            // Attach transform gizmo
            transformControls.attach(mesh);
            
            // Update Visual BoxHelper
            selectionBoxHelper.setFromObject(mesh);
            selectionBoxHelper.visible = true;

            // Update UI
            updateBrowserTree(); // Refresh tree to show active state
            
            propertiesEmpty.classList.add('hidden');
            propertiesPanel.classList.remove('hidden');
            updatePropertiesUI();
        }

        function deselectObject() {
            selectedObject = null;
            transformControls.detach();
            selectionBoxHelper.visible = false;
            
            updateBrowserTree();
            
            propertiesEmpty.classList.remove('hidden');
            propertiesPanel.classList.add('hidden');
        }

        // --- UI Updates ---
        function updateBrowserTree() {
            browserTree.innerHTML = '';
            
            // Iterate backwards to show newest objects at the top
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                const isSelected = selectedObject === obj;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = `flex justify-between items-center p-2 rounded cursor-pointer text-xs ${isSelected ? 'bg-blue-600 text-white' : 'hover:bg-gray-700 text-gray-300'}`;
                
                const nameSpan = document.createElement('span');
                nameSpan.innerText = obj.name;
                nameSpan.onclick = () => selectObject(obj);
                
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '&times;';
                deleteBtn.className = "text-lg font-bold text-gray-400 hover:text-red-400 px-2";
                deleteBtn.onclick = (e) => {
                    e.stopPropagation(); // Prevent triggering selection
                    deleteObject(obj);
                };

                itemDiv.appendChild(nameSpan);
                itemDiv.appendChild(deleteBtn);
                browserTree.appendChild(itemDiv);
            }
        }

        function updatePropertiesUI() {
            if (!selectedObject) return;

            document.getElementById('prop-name').value = selectedObject.name;
            
            // Position
            document.getElementById('prop-pos-x').value = selectedObject.position.x.toFixed(2);
            document.getElementById('prop-pos-y').value = selectedObject.position.y.toFixed(2);
            document.getElementById('prop-pos-z').value = selectedObject.position.z.toFixed(2);

            // Scale
            document.getElementById('prop-scale-x').value = selectedObject.scale.x.toFixed(2);
            document.getElementById('prop-scale-y').value = selectedObject.scale.y.toFixed(2);
            document.getElementById('prop-scale-z').value = selectedObject.scale.z.toFixed(2);

            // Color (Convert Three.js color to hex string for HTML input)
            document.getElementById('prop-color').value = '#' + selectedObject.material.color.getHexString();
        }

        // --- Handle Input Changes from Properties Panel ---
        function setupPropertyListeners() {
            const updateTransform = () => {
                if (!selectedObject) return;
                
                selectedObject.position.set(
                    parseFloat(document.getElementById('prop-pos-x').value) || 0,
                    parseFloat(document.getElementById('prop-pos-y').value) || 0,
                    parseFloat(document.getElementById('prop-pos-z').value) || 0
                );

                selectedObject.scale.set(
                    parseFloat(document.getElementById('prop-scale-x').value) || 1,
                    parseFloat(document.getElementById('prop-scale-y').value) || 1,
                    parseFloat(document.getElementById('prop-scale-z').value) || 1
                );

                selectionBoxHelper.update(); // Update wireframe
            };

            ['pos-x', 'pos-y', 'pos-z', 'scale-x', 'scale-y', 'scale-z'].forEach(id => {
                document.getElementById(`prop-${id}`).addEventListener('input', updateTransform);
            });

            document.getElementById('prop-color').addEventListener('input', (e) => {
                if (selectedObject) {
                    selectedObject.material.color.set(e.target.value);
                }
            });
        }

        // --- Deletion & Memory Cleanup ---
        function deleteObject(obj) {
            if (selectedObject === obj) deselectObject();

            // Remove from scene and array
            scene.remove(obj);
            objects = objects.filter(o => o !== obj);

            // Dispose geometries and materials to prevent memory leaks
            obj.geometry.dispose();
            obj.material.dispose();

            updateBrowserTree();
        }

        function undoLastObject() {
            if (objects.length > 0) {
                const lastObj = objects[objects.length - 1];
                deleteObject(lastObj);
            }
        }

        function clearScene() {
            // Iterate backwards to avoid index shifting issues
            for (let i = objects.length - 1; i >= 0; i--) {
                deleteObject(objects[i]);
            }
            objectCounter = 1; // Reset counter
        }

        // --- Window Resize & Animation Loop ---
        function onWindowResize() {
            camera.aspect = viewport.clientWidth / viewport.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(viewport.clientWidth, viewport.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Required for damping to work
            orbitControls.update(); 
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
